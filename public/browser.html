<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>浏览器预览 — Q-CLI</title>
  <link rel="stylesheet" href="/css/theme.css" />
  <link rel="stylesheet" href="/css/right-panel.css" />
  <link rel="stylesheet" href="/css/quant-trading.css" />
  <style>
    html, body {
      height: 100%; margin: 0; padding: 0; overflow: hidden;
      background: var(--bg-surface, #11111b);
      color: var(--text-primary, #cdd6f4);
      font-family: var(--font-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif);
      display: flex; flex-direction: column;
    }
    .browser-nav {
      display: flex; align-items: center; gap: 12px;
      padding: 8px 16px;
      background: var(--bg-elevated, #1e1e2e);
      border-bottom: 1px solid var(--border-default, #313244);
      flex-shrink: 0; user-select: none;
    }
    .browser-nav-back {
      color: var(--accent, #4f46e5); text-decoration: none;
      font-size: 13px; padding: 4px 10px; border-radius: 4px;
      transition: background 0.12s; cursor: pointer;
    }
    .browser-nav-back:hover { background: var(--bg-hover, #313244); }
    .browser-nav-title { font-size: 15px; font-weight: 600; }
    .browser-nav-subtitle { font-size: 12px; color: var(--text-tertiary, #6c7086); }
    .browser-nav-spacer { flex: 1; }
    .browser-toolbar {
      display: flex; gap: 6px; padding: 8px;
      border-bottom: 1px solid var(--border-default, #313244); flex-shrink: 0;
    }
    .browser-url-bar { flex: 1; display: flex; gap: 4px; }
    .browser-url-bar input {
      flex: 1; padding: 4px 8px; border: 1px solid var(--border-default, #313244);
      border-radius: 4px; font-size: 13px;
      background: var(--bg-elevated, #1e1e2e); color: var(--text-primary, #cdd6f4); outline: none;
    }
    .browser-url-bar input:focus { border-color: var(--accent, #4f46e5); }
    .browser-go {
      padding: 4px 12px; cursor: pointer; border-radius: 4px;
      background: var(--accent, #4f46e5); color: #fff; border: none; font-size: 12px;
    }
    .browser-go:hover { background: var(--accent-hover, #4338ca); }
    .browser-viewport { flex: 1; display: flex; position: relative; overflow: hidden; }
    .browser-viewport iframe { width: 100%; height: 100%; border: none; background: #fff; }
    .browser-status {
      padding: 2px 8px; font-size: 11px; color: var(--text-tertiary, #6c7086);
      border-top: 1px solid var(--border-default, #313244); flex-shrink: 0; user-select: none;
    }
  </style>
</head>
<body data-theme="dark">
  <nav class="browser-nav">
    <a class="browser-nav-back" href="/" onclick="event.preventDefault(); location.href='/';">&larr; 返回主应用</a>
    <span class="browser-nav-title">🌐 浏览器预览</span>
    <span class="browser-nav-subtitle">独立页面</span>
    <span class="browser-nav-spacer"></span>
    <span class="browser-nav-status" style="font-size:11px;color:var(--text-tertiary);">独立模式</span>
  </nav>
  <div class="browser-toolbar">
    <div class="browser-url-bar">
      <input id="browser-url-input" type="text" placeholder="输入 URL，例如 https://example.com" />
      <button id="browser-go-btn" class="browser-go">前往</button>
    </div>
  </div>
  <div class="browser-viewport">
    <iframe id="browser-iframe" src="about:blank" sandbox="allow-scripts allow-same-origin allow-forms allow-popups" loading="lazy"></iframe>
  </div>
  <div class="browser-status">
    <span id="browser-status-text">就绪</span>
  </div>
  <script src="/bundle.js"></script>
</body>
</html>
