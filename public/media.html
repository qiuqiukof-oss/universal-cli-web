<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>多媒体 — Q-CLI</title>
  <link rel="stylesheet" href="/css/theme.css" />
  <link rel="stylesheet" href="/css/media.css" />
  <link rel="stylesheet" href="/css/quant-trading.css" />
  <style>
    html, body {
      height: 100%; margin: 0; padding: 0; overflow: hidden;
      background: var(--bg-surface, #11111b);
      color: var(--text-primary, #cdd6f4);
      font-family: var(--font-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif);
      display: flex; flex-direction: column;
    }
    .media-nav {
      display: flex; align-items: center; gap: 12px;
      padding: 8px 16px;
      background: var(--bg-elevated, #1e1e2e);
      border-bottom: 1px solid var(--border-default, #313244);
      flex-shrink: 0; user-select: none;
    }
    .media-nav-back {
      color: var(--accent, #4f46e5); text-decoration: none;
      font-size: 13px; padding: 4px 10px; border-radius: 4px;
      transition: background 0.12s; cursor: pointer;
    }
    .media-nav-back:hover { background: var(--bg-hover, #313244); }
    .media-nav-title { font-size: 15px; font-weight: 600; }
    .media-nav-subtitle { font-size: 12px; color: var(--text-tertiary, #6c7086); }
    .media-nav-spacer { flex: 1; }
    #rp-media {
      flex: 1; display: flex; flex-direction: column; min-height: 0; overflow: hidden;
    }
    #rp-media .media-content {
      max-width: none;
      padding: 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
    }
    /* Widen gallery for standalone */
    #rp-media .media-gallery {
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    }
  </style>
</head>
<body data-theme="dark">
  <nav class="media-nav">
    <a class="media-nav-back" href="/" onclick="event.preventDefault(); location.href='/';">&larr; 返回主应用</a>
    <span class="media-nav-title">🎬 多媒体</span>
    <span class="media-nav-subtitle">独立页面</span>
    <span class="media-nav-spacer"></span>
    <span class="media-nav-status" style="font-size:11px;color:var(--text-tertiary);">独立模式</span>
  </nav>
  <div class="rp-panel active" id="rp-media">
    <div class="dash-empty" style="padding:40px;text-align:center;color:var(--text-tertiary);">
      <div style="font-size:32px;margin-bottom:12px;">🎬</div>
      加载中...
    </div>
  </div>
  <script src="/bundle.js"></script>
  <script>
    setTimeout(() => {
      const panel = document.getElementById('rp-media');
      if (panel && panel.querySelector('.dash-empty')) {
        // multi-media.js init hooks Q.RightPanel.switchTab;
        // if RightPanel doesn't exist, we trigger render directly
        if (window.QCLI?.Media?.render) {
          window.QCLI.Media.render();
        }
      }
    }, 300);
  </script>
</body>
</html>
